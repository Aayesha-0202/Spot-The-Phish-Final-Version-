services:
  # ---------- Sidecar nginx (frontend + API proxy) ----------
  spot-the-phish-sidecar:
    container_name: spot-the-phish-sidecar
    build:
      context: .
      dockerfile: Dockerfile
    networks:
      - games_proxy
      - spot-the_phish_net
    deploy:
      resources:
        limits:
          memory: 50M
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s

  # ---------- Backend API ----------
  spot-the-phish-backend:
    container_name: spot-the-phish-backend
    build:
      context: ./backend
      dockerfile: Dockerfile
    networks:
      - spot-the_phish_net
    env_file:
      - ./backend/.env
    deploy:
      resources:
        limits:
          memory: 256M
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:5000/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  # ---------- MongoDB (local dev only — production uses omnideck backend VM) ----------
  spot-the-phish-mongo:
    container_name: spot-the-phish-mongo
    image: mongo:7
    networks:
      - spot-the_phish_net
    volumes:
      - spot_the_phish_mongo_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: spotthephish
    deploy:
      resources:
        limits:
          memory: 256M
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.runCommand({ ping: 1 }).ok"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

volumes:
  spot_the_phish_mongo_data:
    driver: local

networks:
  games_proxy:
    external: true
  spot-the_phish_net:
    driver: bridge
